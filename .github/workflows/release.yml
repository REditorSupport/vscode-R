name: release

# runs when a tag v* is pushed
# releases the extension to GitHub and the vscode marketplace

on:
  push:
    tags: ["v*"]

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - name: Package extension
        id: package
        run: |
          npx @vscode/vsce package
          echo "VSIX_FILE=$(ls *.vsix)" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: vsix-artifact
          path: "*.vsix"

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: vsix-artifact
          path: artifacts/
      - name: Create release
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          gh release create v$VERSION artifacts/*.vsix \
            --title "v$VERSION" \
            --notes "Release v$VERSION" \
            --generate-notes

  publish:
    name: Publish
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: vsix-artifact
          path: artifacts/
      - name: Publish to Visual Studio Marketplace
        run: npx @vscode/vsce publish -p ${{ secrets.VSCE_TOKEN }} --packagePath artifacts/*.vsix
      - name: Publish to Open VSX Registry
        run: npx ovsx publish -p ${{ secrets.OPEN_VSX_TOKEN }} --packagePath artifacts/*.vsix
